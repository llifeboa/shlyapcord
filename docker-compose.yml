services:
  server:
    build:
      context: ./apps/server
    environment:
      SERVER_PORT: 8080
      INVITE_TOKENS: ${INVITE_TOKENS:-local-dev}
      CORS_ORIGINS: "${CORS_ORIGINS:-*}"
      STUN_URL: ${STUN_URL:-stun:stun.l.google.com:19302}
      TURN_URL: ${TURN_URL:-}
      TURN_USERNAME: ${TURN_USERNAME:-}
      TURN_CREDENTIAL: ${TURN_CREDENTIAL:-}
    ports:
      - "8080:8080"

  web:
    build:
      context: ./apps/web
    depends_on:
      - server

  proxy:
    image: nginx:1.27-alpine
    depends_on:
      - web
      - server
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "127.0.0.1:3000:80"

  turn:
    image: coturn/coturn:4.6
    profiles:
      - turn
    command:
      - --listening-port=3478
      - --fingerprint
      - --lt-cred-mech
      - --user=${TURN_USERNAME:-shlyapcord}:${TURN_CREDENTIAL:-change-me}
      - --realm=${TURN_REALM:-shlyapcord.local}
      - --no-cli
      - --no-tls
      - --no-dtls
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
